appId: app.restora.pos.desktop
productName: Your Restaurant POS
copyright: Copyright © 2026 Your Restaurant

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  # pnpm workspace symlinks leak turbo caches and sibling packages into the
  # pack. We only need our compiled dist/ + node_modules — exclude the rest.
  - '!**/.turbo/**'
  - '!**/*.map'
  - '!**/{tsconfig,tsconfig.*}.json'
  - '!packages/*/src/**'

# Native modules must be rebuilt against Electron's Node ABI at package time.
# We do this ourselves via `electron-rebuild -w better-sqlite3` in the dist
# script BEFORE electron-builder runs, then disable electron-builder's own
# rebuild step. Its built-in @electron/rebuild walks the entire pnpm flat
# tree under node_modules/.pnpm and chokes on broken optional-platform
# symlinks (e.g. @esbuild/aix-ppc64 on Windows hosts), which kills the
# build with a misleading ENOENT.
npmRebuild: false

# Bundle SumatraPDF portable so the silent PDF-print path works on every
# Windows box out of the box, regardless of which PDF viewer is installed.
# Copied to Resources/SumatraPDF.exe next to the app; pdf-print.ts resolves
# it via process.resourcesPath.
extraResources:
  - from: resources/SumatraPDF.exe
    to: SumatraPDF.exe

# better-sqlite3 + any other .node binaries can't live inside asar.
asar: true
asarUnpack:
  - '**/*.node'

win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: Your Restaurant POS
  artifactName: YourRestaurantPOS-Setup-${version}.${ext}
  # icon auto-resolves from build/icon.ico (Windows) or build/icon.png.
  # Drop a 256x256+ .ico in build/ before cutting a real release — the
  # default Electron icon ships until then.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Your Restaurant POS
  uninstallDisplayName: Your Restaurant POS ${version}
  deleteAppDataOnUninstall: false   # preserve paired config + PIN hashes

# Auto-update feed. electron-updater fetches https://github.com/<owner>/<repo>/releases/latest
# and looks for latest.yml + the matching .exe + .blockmap.
publish:
  - provider: github
    owner: highcrash
    repo: your-repo
    releaseType: release
