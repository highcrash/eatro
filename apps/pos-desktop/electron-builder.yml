appId: app.restora.pos.desktop
productName: Restora POS
copyright: Copyright © 2026 Restora

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - package.json
  # pnpm workspace symlinks leak turbo caches and sibling packages into the
  # pack. We only need our compiled dist/ + node_modules — exclude the rest.
  - '!**/.turbo/**'
  - '!**/*.map'
  - '!**/{tsconfig,tsconfig.*}.json'
  - '!packages/*/src/**'

# We run `electron-rebuild -w better-sqlite3` ourselves in the dist script
# before electron-builder kicks in. Letting @electron/rebuild walk the
# entire pnpm flat tree under node_modules/.pnpm fails on broken
# optional-platform symlinks (e.g. @esbuild/aix-ppc64 on a Windows host)
# with a misleading ENOENT. Disable its redundant rebuild pass.
npmRebuild: false

# Bundle SumatraPDF portable so the silent PDF-print path works on every
# Windows box out of the box, regardless of which PDF viewer is installed.
# Copied to Resources/SumatraPDF.exe next to the app; pdf-print.ts resolves
# it via process.resourcesPath.
extraResources:
  - from: resources/SumatraPDF.exe
    to: SumatraPDF.exe

# better-sqlite3 + any other .node binaries can't live inside asar.
asar: true
asarUnpack:
  - '**/*.node'

win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: Restora POS
  artifactName: RestoraPOS-Setup-${version}.${ext}
  # icon auto-resolves from build/icon.ico (Windows) or build/icon.png.
  # Drop a 256x256+ .ico in build/ before cutting a real release — the
  # default Electron icon ships until then.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Restora POS
  uninstallDisplayName: Restora POS ${version}
  deleteAppDataOnUninstall: false   # preserve paired config + PIN hashes

# Auto-update feed. electron-updater fetches https://github.com/<owner>/<repo>/releases/latest
# and looks for latest-<channel>.yml + the matching .exe + .blockmap.
#
# CHANNEL ISOLATION: this branch (main, 2.0.x, no license-client) publishes
# to channel `stable` so its `latest-stable.yml` only updates installs that
# were also built from this branch. The `codecanyon` branch (1.0.x, with
# license-client) publishes to channel `codecanyon` (`latest-codecanyon.yml`).
# Without channel isolation, electron-updater does a plain semver compare
# against the shared `latest.yml` and the higher version always wins — main
# users were briefly auto-updated onto the codecanyon build with its
# license screen. Channels stop that for good.
publish:
  - provider: github
    owner: highcrash
    repo: eatro
    releaseType: release
    channel: stable
