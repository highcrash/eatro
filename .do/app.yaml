# DigitalOcean App Platform spec — Restora POS
# Domain: eatrobd.com
# Region: SGP (Singapore)
#
# Edit this file → commit → push to main → App Platform auto-redeploys.
# To create the App from scratch the first time:
#   doctl apps create --spec .do/app.yaml
# Or paste this YAML into the App Platform "Create from spec" wizard.

name: restora-pos
region: sgp

# ─── Database ────────────────────────────────────────────────────────────────
# Two options — pick ONE:
#
# (A) Provision a new managed Postgres (default, ~$15/mo). Uncomment this block:
#
# databases:
#   - name: db
#     engine: PG
#     version: "15"
#     production: false
#
# (B) Reuse an existing managed Postgres cluster you already pay for.
# Leave the `databases:` block commented out and set DATABASE_URL as a SECRET
# env var on the API service below (already declared as `type: SECRET`).
# Get the connection string from DO → Databases → your cluster → Connection Details,
# swapping in the new user + database name you created for this app.

# ─── API service (NestJS) ────────────────────────────────────────────────────
services:
  - name: api
    github:
      repo: highcrash/restro    # ← change to your repo path
      branch: main
      deploy_on_push: true
    source_dir: /
    instance_size_slug: basic-xxs       # 512 MB / 1 vCPU — bump to basic-s if needed
    instance_count: 1
    http_port: 3001

    # Build: install workspace deps, generate Prisma client, build the API
    build_command: |
      pnpm install --frozen-lockfile
      pnpm prisma generate
      pnpm --filter @restora/api build

    # Start: run migrations then boot Nest
    run_command: |
      pnpm prisma migrate deploy
      node apps/api/dist/main.js

    # Health check on the global health endpoint
    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5

    routes:
      - path: /

    domains:
      - { domain: api.eatrobd.com }

    envs:
      - { key: NODE_ENV, value: production, scope: RUN_AND_BUILD_TIME }
      - { key: PORT, value: "3001", scope: RUN_AND_BUILD_TIME }

      # DATABASE_URL — pick ONE:
      # (A) Auto-injected when using the `databases:` block above:
      # - { key: DATABASE_URL, value: "${db.DATABASE_URL}", scope: RUN_AND_BUILD_TIME }
      # (B) Reusing an existing cluster — set as a secret in the dashboard:
      - { key: DATABASE_URL, scope: RUN_AND_BUILD_TIME, type: SECRET }

      # JWT — generate strong values via "doctl apps update --spec" or the dashboard
      - { key: JWT_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: JWT_REFRESH_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: JWT_REFRESH_EXPIRES_IN, value: "30d", scope: RUN_TIME }

      # Allowed CORS origins (comma-separated)
      - key: CORS_ORIGINS
        value: "https://eatrobd.com,https://www.eatrobd.com,https://admin.eatrobd.com,https://pos.eatrobd.com,https://kds.eatrobd.com,https://qr.eatrobd.com,https://order.eatrobd.com"
        scope: RUN_TIME

      # DigitalOcean Spaces (file uploads)
      - { key: SPACES_REGION, value: "sgp1", scope: RUN_TIME }
      - { key: SPACES_BUCKET, value: "restora-uploads", scope: RUN_TIME }
      - { key: SPACES_ENDPOINT, value: "https://sgp1.digitaloceanspaces.com", scope: RUN_TIME }
      - { key: SPACES_PUBLIC_BASE, value: "https://restora-uploads.sgp1.digitaloceanspaces.com", scope: RUN_TIME }
      - { key: SPACES_KEY, scope: RUN_TIME, type: SECRET }
      - { key: SPACES_SECRET, scope: RUN_TIME, type: SECRET }

      # Optional SMS (sms.net.bd)
      - { key: SMS_API_KEY, scope: RUN_TIME, type: SECRET }

# ─── Static frontends ────────────────────────────────────────────────────────
# Each Vite app builds into apps/<name>/dist and serves as a CDN-fronted static site.
# Auto-deploy on push is enabled per component.
static_sites:

  - name: web
    github:
      repo: highcrash/restro
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm --filter @restora/web build
    output_dir: apps/web/dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_BASE_URL, value: "https://api.eatrobd.com/api/v1", scope: BUILD_TIME }
    routes:
      - path: /
    domains:
      - { domain: eatrobd.com, type: PRIMARY }
      - { domain: www.eatrobd.com }

  - name: admin
    github: { repo: highcrash/restro, branch: main, deploy_on_push: true }
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm --filter @restora/admin build
