# DigitalOcean App Platform spec — Restora POS
# Domain: eatrobd.com
# Region: SGP (Singapore)
#
# Edit this file → commit → push to main → App Platform auto-redeploys.
# To create the App from scratch the first time:
#   doctl apps create --spec .do/app.yaml
# Or paste this YAML into the App Platform "Create from spec" wizard.

name: restora-pos
region: sgp

# ─── Database ────────────────────────────────────────────────────────────────
# Two options — pick ONE:
#
# (A) Provision a new managed Postgres (default, ~$15/mo). Uncomment this block:
#
# databases:
#   - name: db
#     engine: PG
#     version: "15"
#     production: false
#
# (B) Reuse an existing managed Postgres cluster you already pay for.
# Leave the `databases:` block commented out and set DATABASE_URL as a SECRET
# env var on the API service below (already declared as `type: SECRET`).
# Get the connection string from DO → Databases → your cluster → Connection Details,
# swapping in the new user + database name you created for this app.

# ─── API service (NestJS) ────────────────────────────────────────────────────
services:
  - name: api
    github:
      repo: highcrash/eatro    # ← change to your repo path
      branch: main
      deploy_on_push: true
    source_dir: /
    instance_size_slug: basic-xxs       # 512 MB / 1 vCPU — bump to basic-s if needed
    instance_count: 1
    http_port: 3001

    # Build: install workspace deps, generate Prisma client, build the API
    # `turbo run build --filter=@restora/api` follows the dep graph and builds
    # @restora/types and @restora/utils first.
    build_command: |
      pnpm install --frozen-lockfile
      pnpm prisma generate
      pnpm exec turbo run build --filter=@restora/api

    # Start: run migrations then boot Nest
    run_command: |
      pnpm prisma migrate deploy
      node apps/api/dist/main.js

    # Health check on the global health endpoint
    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5

    routes:
      - path: /

    domains:
      - { domain: api.eatrobd.com }

    envs:
      - { key: NODE_ENV, value: production, scope: RUN_AND_BUILD_TIME }
      - { key: PORT, value: "3001", scope: RUN_AND_BUILD_TIME }

      # DATABASE_URL — pick ONE:
      # (A) Auto-injected when using the `databases:` block above:
      # - { key: DATABASE_URL, value: "${db.DATABASE_URL}", scope: RUN_AND_BUILD_TIME }
      # (B) Reusing an existing cluster — set as a secret in the dashboard:
      - { key: DATABASE_URL, scope: RUN_AND_BUILD_TIME, type: SECRET }

      # JWT — generate strong values via "doctl apps update --spec" or the dashboard
      - { key: JWT_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: JWT_REFRESH_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: JWT_REFRESH_EXPIRES_IN, value: "30d", scope: RUN_TIME }

      # Allowed CORS origins (comma-separated)
      - key: CORS_ORIGINS
        value: "https://eatrobd.com,https://www.eatrobd.com,https://admin.eatrobd.com,https://pos.eatrobd.com,https://kds.eatrobd.com,https://qr.eatrobd.com,https://order.eatrobd.com"
        scope: RUN_TIME

      # DigitalOcean Spaces (file uploads)
      - { key: SPACES_REGION, value: "sgp1", scope: RUN_TIME }
      - { key: SPACES_BUCKET, value: "restora-uploads", scope: RUN_TIME }
      - { key: SPACES_ENDPOINT, value: "https://sgp1.digitaloceanspaces.com", scope: RUN_TIME }
      - { key: SPACES_PUBLIC_BASE, value: "https://restora-uploads.sgp1.digitaloceanspaces.com", scope: RUN_TIME }
      - { key: SPACES_KEY, scope: RUN_TIME, type: SECRET }
      - { key: SPACES_SECRET, scope: RUN_TIME, type: SECRET }

      # Optional SMS (sms.net.bd)
      - { key: SMS_API_KEY, scope: RUN_TIME, type: SECRET }

  # ─── License server (self-hosted, product-agnostic) ───────────────────
  # Backs the CodeCanyon Restora POS edition + any future products. Runs
  # against its OWN Postgres database (LICENSE_DB_URL is a SECRET env —
  # create a separate logical DB on the existing cluster, or a new cluster).
  # Swagger at https://license.eatrobd.com/api/docs (disabled when
  # NODE_ENV=production, so leave NODE_ENV=development if you want it
  # reachable — or flip to production once the admin UI is the primary
  # management surface).
  - name: license-server
    github:
      repo: highcrash/eatro
      branch: main
      deploy_on_push: true
    source_dir: /
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 3002

    build_command: |
      pnpm install --frozen-lockfile
      pnpm --filter @restora/license-server exec prisma generate --schema ./prisma/schema.prisma
      pnpm exec turbo run build --filter=@restora/license-server

    run_command: |
      pnpm --filter @restora/license-server exec prisma migrate deploy --schema ./prisma/schema.prisma
      node apps/license-server/dist/main.js

    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 5

    routes:
      - path: /

    domains:
      - { domain: license.eatrobd.com }

    envs:
      - { key: NODE_ENV, value: production, scope: RUN_AND_BUILD_TIME }
      - { key: PORT, value: "3002", scope: RUN_AND_BUILD_TIME }

      # SECRETS — set in the dashboard. LICENSE_SIGNING_KEK and
      # LICENSE_HMAC_PEPPER are 32-byte base64 values; rotating either
      # requires re-wrapping every ed25519 private key and re-deriving
      # every hmacSecret, so pick once and guard.
      - { key: LICENSE_DB_URL, scope: RUN_AND_BUILD_TIME, type: SECRET }
      - { key: LICENSE_ADMIN_JWT_SECRET, scope: RUN_TIME, type: SECRET }
      - { key: LICENSE_SIGNING_KEK, scope: RUN_TIME, type: SECRET }
      - { key: LICENSE_HMAC_PEPPER, scope: RUN_TIME, type: SECRET }
      - { key: ADMIN_EMAIL, scope: RUN_TIME, type: SECRET }
      - { key: ADMIN_PASSWORD_HASH, scope: RUN_TIME, type: SECRET }

      - { key: LICENSE_ADMIN_ORIGIN, value: "https://license-admin.eatrobd.com", scope: RUN_TIME }
      - { key: LICENSE_ADMIN_JWT_EXPIRES_IN, value: "8h", scope: RUN_TIME }
      - { key: LICENSE_PROOF_TTL_SECONDS, value: "86400", scope: RUN_TIME }
      - { key: LICENSE_PROOF_GRACE_SECONDS, value: "604800", scope: RUN_TIME }
      - { key: LICENSE_PUBLIC_API_RATE_ACTIVATE, value: "5", scope: RUN_TIME }
      - { key: LICENSE_PUBLIC_API_RATE_VERIFY, value: "60", scope: RUN_TIME }

      # Optional: Envato Personal Token for bulk purchase-code import.
      # Leave empty until v1.1 Envato sync lands.
      - { key: ENVATO_PERSONAL_TOKEN, scope: RUN_TIME, type: SECRET }

# ─── Static frontends ────────────────────────────────────────────────────────
# Each Vite app builds into apps/<name>/dist and serves as a CDN-fronted static site.
# Auto-deploy on push is enabled per component.
static_sites:

  - name: web
    github:
      repo: highcrash/eatro
      branch: main
      deploy_on_push: true
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm exec turbo run build --filter=@restora/web
    output_dir: apps/web/dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_BASE_URL, value: "https://api.eatrobd.com/api/v1", scope: BUILD_TIME }
    routes:
      - path: /
    domains:
      - { domain: eatrobd.com, type: PRIMARY }
      - { domain: www.eatrobd.com }

  - name: admin
    github: { repo: highcrash/eatro, branch: main, deploy_on_push: true }
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm exec turbo run build --filter=@restora/admin
    output_dir: apps/admin/dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_BASE_URL, value: "https://api.eatrobd.com/api/v1", scope: BUILD_TIME }
    routes:
      - path: /
    domains:
      - { domain: admin.eatrobd.com }

  - name: pos
    github: { repo: highcrash/eatro, branch: main, deploy_on_push: true }
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm exec turbo run build --filter=@restora/pos
    output_dir: apps/pos/dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_BASE_URL, value: "https://api.eatrobd.com/api/v1", scope: BUILD_TIME }
    routes:
      - path: /
    domains:
      - { domain: pos.eatrobd.com }

  - name: kds
    github: { repo: highcrash/eatro, branch: main, deploy_on_push: true }
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm exec turbo run build --filter=@restora/kds
    output_dir: apps/kds/dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_BASE_URL, value: "https://api.eatrobd.com/api/v1", scope: BUILD_TIME }
    routes:
      - path: /
    domains:
      - { domain: kds.eatrobd.com }

  # `apps/qr` is the legacy single-file QR app — superseded by `qr-order`.
  # Kept here with no domain so it doesn't get built and doesn't receive
  # traffic. Remove once confirmed nothing references it.
  # - name: qr
  #   github: { repo: highcrash/eatro, branch: main, deploy_on_push: true }
  #   source_dir: /
  #   build_command: |
  #     pnpm install --frozen-lockfile
  #     pnpm exec turbo run build --filter=@restora/qr
  #   output_dir: apps/qr/dist
  #   catchall_document: index.html
  #   envs:
  #     - { key: VITE_API_BASE_URL, value: "https://api.eatrobd.com/api/v1", scope: BUILD_TIME }
  #   routes: [{ path: / }]
  #   domains: [{ domain: qr.eatrobd.com }]

  - name: qr-order
    github: { repo: highcrash/eatro, branch: main, deploy_on_push: true }
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm exec turbo run build --filter=@restora/qr-order
    output_dir: apps/qr-order/dist
    catchall_document: index.html
    envs:
      - { key: VITE_API_BASE_URL, value: "https://api.eatrobd.com/api/v1", scope: BUILD_TIME }
    routes:
      - path: /
    domains:
      # qr.eatrobd.com (the customer-facing URL everyone knows) points here.
      # order.eatrobd.com kept as an alias for backwards compatibility with
      # any printed QR codes that used it during early testing.
      - { domain: qr.eatrobd.com, type: PRIMARY }
      - { domain: order.eatrobd.com }

  - name: license-admin
    github: { repo: highcrash/eatro, branch: main, deploy_on_push: true }
    source_dir: /
    build_command: |
      pnpm install --frozen-lockfile
      pnpm exec turbo run build --filter=@restora/license-admin
    output_dir: apps/license-admin/dist
    catchall_document: index.html
    envs:
      - { key: VITE_LICENSE_API_BASE_URL, value: "https://license.eatrobd.com/api/v1", scope: BUILD_TIME }
    routes:
      - path: /
    domains:
      - { domain: license-admin.eatrobd.com }

# Note on routing:
# Each static site has its own DOMAIN, so all of them get path "/" — no conflicts.
# The API service runs on api.eatrobd.com (set via the dashboard after first deploy
# OR add a `domains:` block here mirroring the static-site pattern).
