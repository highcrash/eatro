name: release-pos-desktop

# Fires on tag push (`git tag pos-desktop-vX.Y.Z && git push --tags`) or
# manual dispatch from the Actions tab.
on:
  push:
    tags:
      - 'pos-desktop-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup@v4 reads the pnpm version from the root
      # package.json's `packageManager` field (currently pnpm@10.33.0).
      # Passing `version:` here in addition causes "multiple versions"
      # errors and was what killed every prior release run.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The codecanyon edition pulls @restora/license-client as a git
      # tarball. The package's `prepare: tsc` script is supposed to
      # build its `dist/` after install, but on CI that prepare hook
      # has been silently leaving dist/ empty across every 1.0.x
      # release since 1.0.5 (works locally because the dev environment
      # provides typescript globally). The main-branch (no
      # license-client dep) loop matches no dirs and is a no-op, so
      # this step is safe to run on both branches.
      - name: Ensure license-client dist exists (codecanyon only)
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          for pkg_dir in node_modules/.pnpm/@restora+license-client@*/node_modules/@restora/license-client; do
            if [ ! -f "$pkg_dir/dist/index.js" ]; then
              echo "Building license-client at $pkg_dir"
              (cd "$pkg_dir" && npx --yes typescript@5.6 tsc)
            else
              echo "license-client dist already present at $pkg_dir"
            fi
          done

      # Split the desktop's `dist` script into discrete steps so a
      # failure surfaces which sub-command broke instead of the
      # opaque "Build installer / exit code 1" the previous combined
      # step kept producing.
      - name: Fetch SumatraPDF resource
        run: pnpm --filter @restora/pos-desktop fetch-resources

      - name: Rebuild native modules for Electron
        run: pnpm --filter @restora/pos-desktop rebuild:native

      - name: electron-vite build (renderer + main bundles)
        run: pnpm --filter @restora/pos-desktop exec electron-vite build

      # Strip files from the license-client tarball that electron-builder's
      # asar packaging chokes on. The yml exclude pattern targets the
      # symlink path `node_modules/@restora/license-client/src` but pnpm's
      # actual hoist layout is `node_modules/.pnpm/@restora+license-client@.../node_modules/@restora/license-client/src`,
      # which the glob doesn't always traverse on Windows. Removing
      # src + tests + tsconfig from disk before packaging is brute-force
      # but bulletproof — the runtime only needs the compiled dist/.
      - name: Strip license-client source from disk (codecanyon only)
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          for pkg_dir in node_modules/.pnpm/@restora+license-client@*/node_modules/@restora/license-client; do
            echo "Stripping non-runtime files from $pkg_dir"
            rm -rf "$pkg_dir/src" "$pkg_dir/tests" "$pkg_dir/__tests__"
            rm -f "$pkg_dir/tsconfig.json" "$pkg_dir/jest.config.js" "$pkg_dir/jest.config.ts" "$pkg_dir"/*.test.*
          done

      - name: electron-builder package
        run: pnpm --filter @restora/pos-desktop exec electron-builder --win --config electron-builder.yml --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder

      # Capture release/ artifacts (and any partial output / logs)
      # on failure so the next investigation has the actual log line
      # rather than another opaque "exit code 1".
      - name: Upload electron-builder debug artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pos-desktop-debug-${{ github.ref_name }}
          path: |
            apps/pos-desktop/release/**/*
            apps/pos-desktop/dist/**/*
          if-no-files-found: warn
          retention-days: 7

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/pos-desktop-v')
        with:
          files: |
            apps/pos-desktop/release/*.exe
            apps/pos-desktop/release/*.yml
            apps/pos-desktop/release/*.blockmap
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
