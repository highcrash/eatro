version: '3.9'

# ─── Restora POS — Local Development Infrastructure ──────────────────────────
# Start with: pnpm infra:up
# Stop with:  pnpm infra:down
#
# Services:
#   postgres          → localhost:5434   (main app DB, PostgreSQL 15)
#   license-postgres  → localhost:5435   (license server DB, PostgreSQL 15)
#   redis             → localhost:6380   (Redis 7)
#   pgadmin           → localhost:5050   (optional DB GUI, --profile tools)

services:
  postgres:
    image: postgres:15-alpine
    container_name: restora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: restora
      POSTGRES_PASSWORD: restora_dev_password
      POSTGRES_DB: restora_dev
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restora -d restora_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # License server DB — dedicated cluster so an outage on the main app DB
  # doesn't take activation/verification offline, and vice versa. Same
  # pattern as prod: separate logical cluster, separate credentials,
  # separate volume.
  license-postgres:
    image: postgres:15-alpine
    container_name: restora-license-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: license
      POSTGRES_PASSWORD: license_dev_password
      POSTGRES_DB: license_dev
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    ports:
      - "5435:5432"
    volumes:
      - license-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U license -d license_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: restora-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: restora-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@restora.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres-data:
    name: restora-postgres-data
  license-postgres-data:
    name: restora-license-postgres-data
  redis-data:
    name: restora-redis-data
